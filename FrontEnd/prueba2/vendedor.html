<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnCamino | Panel Vendedor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --primary: #000000;
      --accent-blue: #007AFF;
      --accent-green: #34C759;
      --accent-orange: #FF9500;

      --card-bg: rgba(255, 255, 255, 0.78);
      --card-border: 1px solid rgba(255, 255, 255, 0.7);
      --global-shadow: 0 20px 50px rgba(0, 0, 0, 0.04), 0 4px 12px rgba(0, 0, 0, 0.02);
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      min-height: 100vh;
      background-image: linear-gradient(135deg, rgba(238, 241, 247, 0.75) 0%, rgba(243, 244, 248, 0.88) 100%),
        url('https://images.unsplash.com/photo-1587293852726-70cdb56c2866?auto=format&fit=crop&w=1600&q=80');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #1d1d1f;
      -webkit-font-smoothing: antialiased;
    }

    /* NAVBAR ULTRA ESTILIZADA */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 6%;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-container img {
      height: 40px;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .logo-container img:hover {
      transform: scale(1.05) rotate(-1.5deg);
      filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.1));
    }

    .btn-logout {
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      font-size: 13px;
      padding: 10px 24px;
      border-radius: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: -0.2px;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-logout:hover {
      background: #000;
      color: #fff;
      border-color: #000;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
      transform: translateY(-2px);
    }

    /* DASHBOARD LAYOUT */
    .dashboard-container {
      max-width: 1050px;
      margin: 50px auto;
      padding: 0 20px;
    }

    /* GLASSMORPHISM CARDS V3 */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 30px;
      padding: 35px;
      margin-bottom: 28px;
      border: var(--card-border);
      box-shadow: var(--global-shadow);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .card:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 35px 70px rgba(0, 0, 0, 0.07), 0 10px 30px rgba(0, 0, 0, 0.02);
    }

    /* ENTRADAS GRADUALES */
    .reveal {
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .d1 {
      animation-delay: 0.1s;
    }

    .d2 {
      animation-delay: 0.2s;
    }

    .d3 {
      animation-delay: 0.3s;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(35px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* HOLO AVATAR CON PULSACIÓN */
    .avatar-wrapper {
      position: relative;
      display: inline-block;
    }

    .avatar-wrapper::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      border-radius: 24px;
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.1);
      animation: pulseGlow 2.5s infinite ease-in-out;
    }

    @keyframes pulseGlow {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.08);
        opacity: 0;
        box-shadow: 0 0 0 8px rgba(0, 0, 0, 0.05);
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* BADGE DE NIVEL ORO PREMIUM */
    .gold-badge {
      background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
      color: #3d2a04;
      padding: 8px 18px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.5px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      box-shadow: 0 6px 20px rgba(170, 119, 28, 0.25);
      background-size: 400% 400%;
      animation: gold-shimmer 5s ease infinite;
    }

    @keyframes gold-shimmer {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* STATS GRID & NEON NEOMORPHISM */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-bottom: 28px;
    }

    .stat-card {
      position: relative;
      overflow: hidden;
    }

    .stat-card h3 {
      font-size: 52px;
      margin: 0 0 4px 0;
      font-weight: 800;
      letter-spacing: -2px;
      transition: all 0.4s ease;
    }

    .stat-card p {
      margin: 0 0 16px 0;
      color: #6e6e73;
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    /* Micro barra de carga estética */
    .stat-progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 2px;
      overflow: hidden;
    }

    .stat-progress-fill {
      height: 100%;
      width: 0;
      border-radius: 2px;
      transition: width 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s;
    }

    .stat-icon {
      position: absolute;
      right: 25px;
      bottom: 25px;
      font-size: 46px;
      opacity: 0.06;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* BLUE HOVER */
    .stat-blue:hover h3 {
      color: var(--accent-blue);
      text-shadow: 0 0 20px rgba(0, 122, 255, 0.2);
    }

    .stat-blue:hover {
      box-shadow: 0 25px 50px rgba(0, 122, 255, 0.12);
      border-color: rgba(0, 122, 255, 0.3);
    }

    .stat-blue:hover .stat-icon {
      color: var(--accent-blue);
      opacity: 0.16;
      transform: scale(1.25) rotate(-10deg);
    }

    /* GREEN HOVER */
    .stat-green:hover h3 {
      color: var(--accent-green);
      text-shadow: 0 0 20px rgba(52, 199, 89, 0.2);
    }

    .stat-green:hover {
      box-shadow: 0 25px 50px rgba(52, 199, 89, 0.12);
      border-color: rgba(52, 199, 89, 0.3);
    }

    .stat-green:hover .stat-icon {
      color: var(--accent-green);
      opacity: 0.16;
      transform: scale(1.25) rotate(-10deg);
    }

    /* ORANGE HOVER */
    .stat-orange:hover h3 {
      color: var(--accent-orange);
      text-shadow: 0 0 20px rgba(255, 149, 0, 0.2);
    }

    .stat-orange:hover {
      box-shadow: 0 25px 50px rgba(255, 149, 0, 0.12);
      border-color: rgba(255, 149, 0, 0.3);
    }

    .stat-orange:hover .stat-icon {
      color: var(--accent-orange);
      opacity: 0.16;
      transform: scale(1.25) rotate(-10deg);
    }

    /* MOVEMENTS TABLE CON EFECTO IMÁN FANTASMA */
    .table-title {
      font-size: 21px;
      font-weight: 700;
      margin-top: 0;
      margin-bottom: 26px;
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: -0.4px;
    }

    .movements-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 10px;
      text-align: left;
    }

    .movements-table th {
      color: #86868b;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 20px;
    }

    .movements-table tr td {
      background: rgba(255, 255, 255, 0.45);
      padding: 20px;
      font-size: 15px;
      font-weight: 600;
      color: #1c1c1e;
      border-top: 1px solid rgba(255, 255, 255, 0.5);
      border-bottom: 1px solid rgba(0, 0, 0, 0.02);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .movements-table tr td:first-child {
      border-radius: 16px 0 0 16px;
    }

    .movements-table tr td:last-child {
      border-radius: 0 16px 16px 0;
    }

    .movements-table tbody tr:hover td {
      background: #ffffff;
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
      color: #000;
    }

    /* BADGES DE STATUS MODERNOS */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
    }

    .status-route {
      background: rgba(0, 122, 255, 0.08);
      color: var(--accent-blue);
    }

    .status-success {
      background: rgba(52, 199, 89, 0.08);
      color: var(--accent-green);
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="logo-container" style="cursor:pointer" onclick="location.href='index.html'">
      <img src="../Imagenes/enCaminoLogo.svg" alt="EnCamino">
    </div>
    <button class="btn-logout" onclick="location.href='index.html'">
      <i class="fa-solid fa-arrow-right-from-bracket"></i> Cerrar sesión
    </button>
  </nav>

  <main class="dashboard-container">

    <div class="card reveal">
      <div style="display:flex; align-items:center; justify-content: space-between; flex-wrap: wrap; gap:20px;">
        <div style="display:flex; align-items:center; gap:25px;">
          <div class="avatar-wrapper">
            <div
              style="width:75px; height:75px; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color:#fff; border-radius:24px; display:grid; place-items:center; font-size:24px; font-weight:800; box-shadow: 0 10px 30px rgba(15,23,42,0.3);">
              KI
            </div>
          </div>
          <div>
            <h2 style="margin:0; font-size:28px; font-weight:800; letter-spacing: -0.8px;">Kevin Inda Vendedor</h2>
            <p style="margin:6px 0 0 0; color:#6e6e73; font-weight:600; font-size:14px;">
              ID de cuenta: <span style="color:#000; font-weight:800;">EN-9921</span>
            </p>
          </div>
        </div>
        <div>
          <span class="gold-badge"><i class="fa-solid fa-crown"></i> NIVEL ORO</span>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="card stat-card stat-blue reveal d1">
        <h3>12</h3>
        <p>En tránsito</p>
        <div class="stat-progress-bar">
          <div class="stat-progress-fill" style="width: 35%; background: var(--accent-blue);"></div>
        </div>
        <i class="fa-solid fa-truck-fast stat-icon"></i>
      </div>

      <div class="card stat-card stat-green reveal d2">
        <h3>48</h3>
        <p>Entregados</p>
        <div class="stat-progress-bar">
          <div class="stat-progress-fill" style="width: 85%; background: var(--accent-green);"></div>
        </div>
        <i class="fa-solid fa-circle-check stat-icon"></i>
      </div>

      <div class="card stat-card stat-orange reveal d3">
        <h3>3</h3>
        <p>Pendientes</p>
        <div class="stat-progress-bar">
          <div class="stat-progress-fill" style="width: 15%; background: var(--accent-orange);"></div>
        </div>
        <i class="fa-solid fa-clock stat-icon"></i>
      </div>
    </div>

    <div class="card reveal d3" style="padding-bottom: 28px;">
      <h3 class="table-title">
        <i class="fa-solid fa-bolt" style="font-size: 18px; color: #000;"></i> Actividad Reciente
      </h3>
      <table class="movements-table">
        <thead>
          <tr>
            <th>Código de envío</th>
            <th>Estatus Tracking</th>
            <th>Última Fecha</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td style="font-weight: 800; letter-spacing: -0.2px;">#ENC-001</td>
            <td>
              <span class="status-badge status-route">
                <i class="fa-solid fa-circle-notch fa-spin"></i> En Ruta Local
              </span>
            </td>
            <td style="color: #6e6e73; font-weight: 600;">22 Mayo</td>
          </tr>
          <tr>
            <td style="font-weight: 800; letter-spacing: -0.2px;">#ENC-002</td>
            <td>
              <span class="status-badge status-success">
                <i class="fa-solid fa-check-double"></i> Entregado con Éxito
              </span>
            </td>
            <td style="color: #6e6e73; font-weight: 600;">21 Mayo</td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>

  <script>
    // Pequeño trigger de animación para activar las barras estéticas al cargar
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        document.querySelectorAll('.stat-progress-fill').forEach(bar => {
          bar.style.width = bar.style.width; // Forzar renderizado
        });
      }, 200);
    });
  </script>
</body>

</html>
