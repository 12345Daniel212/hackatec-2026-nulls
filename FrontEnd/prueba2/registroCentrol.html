<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Hub | EnCamino</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style4.css">
  <style>
    /* Transición suave para los formularios */
    .form-step {
      transition: opacity 0.4s ease, transform 0.4s ease;
      width: 100%;
    }

    /* Estilo personalizado para el cargador de fotos adaptado al diseño limpio */
    .file-upload-wrapper {
      position: relative;
      width: 100%;
      height: 120px;
      border: 2px dashed #ccc;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      cursor: pointer;
      margin-bottom: 32px;
    }

    .file-upload-wrapper:hover {
      border-color: #000;
      background: rgba(0, 0, 0, 0.02);
    }

    .file-upload-wrapper input[type="file"] {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .file-upload-wrapper i {
      font-size: 28px;
      color: #666;
      margin-bottom: 8px;
    }

    .file-upload-wrapper span {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

  <nav class="navbar-dark-mode">
    <img src="../Imagenes/enCaminoLogo.svg" alt="Logo" class="brand-logo-img" style="cursor: pointer;"
      onclick="window.location.href='index.html'">
  </nav>

  <main class="auth-bg-texture">
    <div class="card-auth-clean">

      <div id="step-negocio" class="form-step">
        <h1>Registra tu Centro de Distribución (Hub)</h1>
        <div class="search-bar-grid" style="display: grid; gap: 16px; margin-bottom: 32px;">
          <div class="input-wrapper" style="width: 100%;">
            <input type="text" class="input-uber" id="nombre-negocio" placeholder="Nombre del negocio o local"
              style="width: 100%;">
          </div>
          <div class="input-wrapper" style="width: 100%;">
            <input type="text" class="input-uber" id="nombre-encargado" placeholder="Nombre completo del encargado"
              style="width: 100%;">
          </div>
        </div>
        <div class="actions-row">
          <button class="btn-icon" onclick="window.location.href='index.html'">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <button class="btn-next" onclick="irADomicilio()">
            Siguiente <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </div>

      <div id="step-domicilio" class="form-step" style="display: none; opacity: 0;">
        <h1>¿Dónde se ubica tu Hub?</h1>
        <div class="search-bar-grid" style="display: grid; gap: 16px; margin-bottom: 32px;">
          <input type="text" class="input-uber" id="domicilio-hub" placeholder="Calle, número, colonia y código postal"
            style="width: 100%;">
        </div>
        <div class="actions-row">
          <button class="btn-icon" onclick="regresarANegocio()">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <button class="btn-next" onclick="irAFoto()">
            Siguiente <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </div>

      <div id="step-foto" class="form-step" style="display: none; opacity: 0;">
        <h1>Sube una foto de la fachada</h1>
        <p style="font-size: 14px; color: #666; margin-bottom: 16px;">Esto ayuda a nuestros repartidores a identificar
          tu establecimiento más rápido.</p>

        <div class="file-upload-wrapper">
          <i class="fa-solid fa-cloud-arrow-up"></i>
          <span id="file-label">Seleccionar o soltar foto aquí</span>
          <input type="file" id="foto-lugar" accept="image/*" onchange="mostrarNombreArchivo()">
        </div>

        <div class="actions-row">
          <button class="btn-icon" onclick="regresarADomicilio()">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <button class="btn-next" onclick="finalizarRegistroHub()">
            Finalizar <i class="fa-solid fa-check"></i>
          </button>
        </div>
      </div>

    </div>
  </main>

  <script>
    // Mostrar el nombre del archivo cuando se suba a la foto
    function mostrarNombreArchivo() {
      const input = document.getElementById('foto-lugar');
      const label = document.getElementById('file-label');
      if (input.files.length > 0) {
        label.innerText = input.files[0].name;
        label.style.color = "#000";
      }
    }

    // Funciones de navegación (Paso 1 -> Paso 2)
    function irADomicilio() {
      const negocio = document.getElementById('step-negocio');
      const domicilio = document.getElementById('step-domicilio');

      if (!document.getElementById('nombre-negocio').value || !document.getElementById('nombre-encargado').value) {
        alert("Por favor, llena todos los campos antes de continuar.");
        return;
      }

      negocio.style.opacity = '0';
      negocio.style.transform = 'translateX(-20px)';

      setTimeout(() => {
        negocio.style.display = 'none';
        domicilio.style.display = 'block';
        setTimeout(() => {
          domicilio.style.opacity = '1';
          domicilio.style.transform = 'translateX(0)';
        }, 50);
      }, 400);
    }

    // Funciones de navegación (Paso 2 -> Paso 1)
    function regresarANegocio() {
      const negocio = document.getElementById('step-negocio');
      const domicilio = document.getElementById('step-domicilio');

      domicilio.style.opacity = '0';
      domicilio.style.transform = 'translateX(20px)';

      setTimeout(() => {
        domicilio.style.display = 'none';
        negocio.style.display = 'block';
        setTimeout(() => {
          negocio.style.opacity = '1';
          negocio.style.transform = 'translateX(0)';
        }, 50);
      }, 400);
    }

    // Funciones de navegación (Paso 2 -> Paso 3)
    function irAFoto() {
      const domicilio = document.getElementById('step-domicilio');
      const foto = document.getElementById('step-foto');

      if (!document.getElementById('domicilio-hub').value) {
        alert("Por favor, ingresa el domicilio de tu establecimiento.");
        return;
      }

      domicilio.style.opacity = '0';
      domicilio.style.transform = 'translateX(-20px)';

      setTimeout(() => {
        domicilio.style.display = 'none';
        foto.style.display = 'block';
        setTimeout(() => {
          foto.style.opacity = '1';
          foto.style.transform = 'translateX(0)';
        }, 50);
      }, 400);
    }

    // Funciones de navegación (Paso 3 -> Paso 2)
    function regresarADomicilio() {
      const domicilio = document.getElementById('step-domicilio');
      const foto = document.getElementById('step-foto');

      foto.style.opacity = '0';
      foto.style.transform = 'translateX(20px)';

      setTimeout(() => {
        foto.style.display = 'none';
        domicilio.style.display = 'block';
        setTimeout(() => {
          domicilio.style.opacity = '1';
          domicilio.style.transform = 'translateX(0)';
        }, 50);
      }, 400);
    }

    // Acción finalización de registro
    function finalizarRegistroHub() {
      const fotoInput = document.getElementById('foto-lugar');
      if (fotoInput.files.length === 0) {
        alert("Por favor, sube una foto de la fachada para terminar.");
        return;
      }

      alert("¡Registro enviado con éxito! Bienvenido a la red de EnCamino.");
      // MODIFICACIÓN: Redirección directa hacia la interfaz de microhub.html
      window.location.href = "microhub.html";
    }
  </script>

</body>

</html>
