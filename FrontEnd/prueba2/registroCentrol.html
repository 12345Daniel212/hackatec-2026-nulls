<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Hub | EnCamino</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style4.css">
  <style>
    /* Transición suave para los formularios */
    .form-step {
      transition: opacity 0.4s ease, transform 0.4s ease;
      width: 100%;
    }

    /* STEPPER - BARRA DE PROGRESO PREMIUM */
    .stepper-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      position: relative;
    }

    .stepper-line {
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      height: 4px;
      width: 100%;
      background: #e0e0e0;
      z-index: 1;
      border-radius: 2px;
    }

    .stepper-progress {
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      height: 4px;
      width: 0%;
      background: #000000;
      /* Color negro característico */
      z-index: 2;
      transition: width 0.4s ease;
      border-radius: 2px;
    }

    .step-dot {
      width: 32px;
      height: 32px;
      background: #e0e0e0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-weight: bold;
      font-size: 14px;
      z-index: 3;
      transition: all 0.4s ease;
    }

    .step-dot.active {
      background: #000000;
      color: #fff;
      box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.15);
    }

    /* CONTENEDOR DE INPUTS CON ICONO INTERNO */
    .input-icon-group {
      position: relative;
      width: 100%;
    }

    .input-icon-group i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
      font-size: 18px;
      transition: color 0.3s ease;
    }

    .input-icon-group .input-uber {
      padding-left: 48px !important;
    }

    .input-icon-group .input-uber:focus+i {
      color: #000000;
    }

    /* CARGADOR DE FOTOS AVANZADO CON PREVIEW */
    .file-upload-wrapper {
      position: relative;
      width: 100%;
      height: 160px;
      border: 2px dashed #bbb;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.01);
      cursor: pointer;
      margin-bottom: 32px;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .file-upload-wrapper:hover {
      border-color: #000;
      background: rgba(0, 0, 0, 0.03);
    }

    .file-upload-wrapper input[type="file"] {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      z-index: 5;
    }

    .upload-info-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 20px;
      transition: all 0.3s ease;
    }

    .file-upload-wrapper i {
      font-size: 36px;
      color: #444;
      margin-bottom: 10px;
    }

    .file-upload-wrapper span {
      font-size: 14px;
      color: #444;
      font-weight: 500;
    }

    /* Imagen previsualizada */
    .preview-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      z-index: 4;
      animation: fadeIn 0.4s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(1.03);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>

  <nav class="navbar-dark-mode">
    <img src="../Imagenes/enCaminoLogo.svg" alt="Logo" class="brand-logo-img" style="cursor: pointer;"
      onclick="window.location.href='index.html'">
  </nav>

  <main class="auth-bg-texture">
    <div class="card-auth-clean">

      <div class="stepper-container">
        <div class="stepper-line"></div>
        <div class="stepper-progress" id="progress-bar"></div>
        <div class="step-dot active" id="dot-1">1</div>
        <div class="step-dot" id="dot-2">2</div>
        <div class="step-dot" id="dot-3">3</div>
      </div>

      <div id="step-negocio" class="form-step">
        <h1>Registra tu Centro de Distribución (Hub)</h1>
        <div class="search-bar-grid" style="display: grid; gap: 16px; margin-bottom: 32px;">

          <div class="input-icon-group">
            <input type="text" class="input-uber" id="nombre-negocio" placeholder="Nombre del negocio o local"
              style="width: 100%;">
            <i class="fa-solid fa-store"></i>
          </div>

          <div class="input-icon-group">
            <input type="text" class="input-uber" id="nombre-encargado" placeholder="Nombre completo del encargado"
              style="width: 100%;">
            <i class="fa-solid fa-user-tie"></i>
          </div>

        </div>
        <div class="actions-row">
          <button class="btn-icon" onclick="window.location.href='index.html'">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <button class="btn-next" onclick="irADomicilio()">
            Siguiente <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </div>

      <div id="step-domicilio" class="form-step" style="display: none; opacity: 0;">
        <h1>¿Dónde se ubica tu Hub?</h1>
        <div class="search-bar-grid" style="display: grid; gap: 16px; margin-bottom: 32px;">

          <div class="input-icon-group">
            <input type="text" class="input-uber" id="domicilio-hub"
              placeholder="Calle, número, colonia y código postal" style="width: 100%;">
            <i class="fa-solid fa-map-location-dot"></i>
          </div>

        </div>
        <div class="actions-row">
          <button class="btn-icon" onclick="regresarANegocio()">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <button class="btn-next" onclick="irAFoto()">
            Siguiente <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </div>

      <div id="step-foto" class="form-step" style="display: none; opacity: 0;">
        <h1>Sube una foto de la fachada</h1>
        <p style="font-size: 14px; color: #666; margin-bottom: 16px;">Esto ayuda a nuestros repartidores a identificar
          tu establecimiento más rápido.</p>

        <div class="file-upload-wrapper">
          <img id="preview-image" class="preview-img" alt="Vista previa de la fachada">
          <div class="upload-info-box" id="upload-prompt">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <span id="file-label">Seleccionar o soltar foto aquí</span>
          </div>
          <input type="file" id="foto-lugar" accept="image/*" onchange="manejarFoto()">
        </div>

        <div class="actions-row">
          <button class="btn-icon" onclick="regresarADomicilio()">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <button class="btn-next" onclick="finalizarRegistroHub()">
            Finalizar <i class="fa-solid fa-check"></i>
          </button>
        </div>
      </div>

    </div>
  </main>

  <script>
    // Control visual de la barra de progreso
    function actualizarProgreso(paso) {
      const progressBar = document.getElementById('progress-bar');
      const dot2 = document.getElementById('dot-2');
      const dot3 = document.getElementById('dot-3');

      if (paso === 1) {
        progressBar.style.width = '0%';
        dot2.classList.remove('active');
        dot3.classList.remove('active');
      } else if (paso === 2) {
        progressBar.style.width = '50%';
        dot2.classList.add('active');
        dot3.classList.remove('active');
      } else if (paso === 3) {
        progressBar.style.width = '100%';
        dot2.classList.add('active');
        dot3.classList.add('active');
      }
    }

    // Procesa la foto subida y muestra la previsualización mamalona
    function manejarFoto() {
      const input = document.getElementById('foto-lugar');
      const preview = document.getElementById('preview-image');
      const promptBox = document.getElementById('upload-prompt');
      const label = document.getElementById('file-label');

      if (input.files && input.files[0]) {
        const reader = new FileReader();

        reader.onload = function (e) {
          preview.src = e.target.result;
          preview.style.display = 'block'; // Muestra la foto
          promptBox.style.opacity = '0';   // Oculta el texto base suavemente
        }

        reader.readAsDataURL(input.files[0]);
      }
    }

    // Funciones de navegación (Paso 1 -> Paso 2)
    function irADomicilio() {
      const negocio = document.getElementById('step-negocio');
      const domicilio = document.getElementById('step-domicilio');

      if (!document.getElementById('nombre-negocio').value || !document.getElementById('nombre-encargado').value) {
        alert("Por favor, llena todos los campos antes de continuar.");
        return;
      }

      actualizarProgreso(2);
      negocio.style.opacity = '0';
      negocio.style.transform = 'translateX(-20px)';

      setTimeout(() => {
        negocio.style.display = 'none';
        domicilio.style.display = 'block';
        setTimeout(() => {
          domicilio.style.opacity = '1';
          domicilio.style.transform = 'translateX(0)';
        }, 50);
      }, 400);
    }

    // Funciones de navegación (Paso 2 -> Paso 1)
    function regresarANegocio() {
      const negocio = document.getElementById('step-negocio');
      const domicilio = document.getElementById('step-domicilio');

      actualizarProgreso(1);
      domicilio.style.opacity = '0';
      domicilio.style.transform = 'translateX(20px)';

      setTimeout(() => {
        domicilio.style.display = 'none';
        negocio.style.display = 'block';
        setTimeout(() => {
          negocio.style.opacity = '1';
          negocio.style.transform = 'translateX(0)';
        }, 50);
      }, 400);
    }

    // Funciones de navegación (Paso 2 -> Paso 3)
    function irAFoto() {
      const domicilio = document.getElementById('step-domicilio');
      const foto = document.getElementById('step-foto');

      if (!document.getElementById('domicilio-hub').value) {
        alert("Por favor, ingresa el domicilio de tu establecimiento.");
        return;
      }

      actualizarProgreso(3);
      domicilio.style.opacity = '0';
      domicilio.style.transform = 'translateX(-20px)';

      setTimeout(() => {
        domicilio.style.display = 'none';
        foto.style.display = 'block';
        setTimeout(() => {
          foto.style.opacity = '1';
          foto.style.transform = 'translateX(0)';
        }, 50);
      }, 400);
    }

    // Funciones de navegación (Paso 3 -> Paso 2)
    function regresarADomicilio() {
      const domicilio = document.getElementById('step-domicilio');
      const foto = document.getElementById('step-foto');

      actualizarProgreso(2);
      foto.style.opacity = '0';
      foto.style.transform = 'translateX(20px)';

      setTimeout(() => {
        foto.style.display = 'none';
        domicilio.style.display = 'block';
        setTimeout(() => {
          domicilio.style.opacity = '1';
          domicilio.style.transform = 'translateX(0)';
        }, 50);
      }, 400);
    }

    // Acción finalización de registro
    function finalizarRegistroHub() {
      const fotoInput = document.getElementById('foto-lugar');
      if (fotoInput.files.length === 0) {
        alert("Por favor, sube una foto de la fachada para terminar.");
        return;
      }

      alert("¡Registro enviado con éxito! Bienvenido a la red de EnCamino.");
      window.location.href = "microhub.html";
    }
  </script>

</body>

</html>
