<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnCamino | Panel Micro-Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --bg: #f0f2f5; --card-shadow: 0 8px 30px rgba(0,0,0,0.15); }
    body { 
      font-family: 'Inter', sans-serif; 
      background-image: linear-gradient(rgba(240, 242, 245, 0.9), rgba(240, 242, 245, 0.9)), url('https://images.unsplash.com/photo-1587293852726-70cdb56c2866?auto=format&fit=crop&w=1600&q=80');
      background-size: cover; background-attachment: fixed; margin: 0; min-height: 100vh;
    }

    .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 80px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #eee; }
    .logo-container img { height: 45px; }

    .dashboard-container { max-width: 1000px; margin: 40px auto; padding: 20px; }

    /* Tarjeta de Local con Imagen */
    .hero-card { display: grid; grid-template-columns: 300px 1fr; gap: 30px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border-radius: 28px; padding: 30px; margin-bottom: 25px; box-shadow: var(--card-shadow); }
    .local-img { width: 100%; height: 200px; background: #ddd; border-radius: 20px; object-fit: cover; }

    /* Tarjetas de datos */
    .card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-radius: 28px; padding: 30px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.5); box-shadow: var(--card-shadow); }
    
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .wallet-box { background: #000; color: #fff; padding: 30px; border-radius: 28px; }
    
    .reveal { opacity: 0; animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="logo-container" style="cursor:pointer" onclick="location.href='index.html'">
       <img src="../Imagenes/enCaminoLogo.svg" alt="EnCamino">
    </div>
    <button onclick="location.href='index.html'" style="border:none; background:none; font-weight:700; cursor:pointer;">Cerrar sesión</button>
  </nav>

  <main class="dashboard-container">
    
    <div class="hero-card reveal">
      <img src="https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=600&q=80" class="local-img">
      <div style="display:flex; flex-direction:column; justify-content:center;">
        <h2 style="margin:0; font-size:32px;">Abarrotes "La Esquina"</h2>
        <p style="color:#666; font-size:18px;"><i class="fa-solid fa-location-dot"></i> Av. México 123, Tepic, Nayarit</p>
        <div style="margin-top:15px;">
           <span style="background:#e8f5e9; color:#2e7d32; padding:6px 15px; border-radius:10px; font-weight:700;">● Estatus: Abierto / Activo</span>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="card reveal">
        <h3>Capacidad de Almacén</h3>
        <div style="height:10px; background:#eee; border-radius:5px; margin:20px 0;">
           <div style="width:75%; height:100%; background:#000; border-radius:5px;"></div>
        </div>
        <p>75% ocupado (15/20 paquetes)</p>
      </div>

      <div class="wallet-box reveal">
        <p style="margin:0; opacity:0.8;">Billetera Digital</p>
        <h1 style="margin:10px 0; font-size:48px;">$4,250.00 <span style="font-size:16px;">MXN</span></h1>
        <button style="padding:10px 20px; border-radius:10px; border:none; cursor:pointer; font-weight:700;">Retirar Fondos</button>
      </div>
    </div>

  </main>
</body>
</html>
