<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnCamino | Panel Micro-Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --primary: #000000;
      --accent-blue: #007AFF;
      --accent-green: #34C759;
      --accent-red: #FF3B30;
      --accent-orange: #FF9500;
      --card-bg: rgba(255, 255, 255, 0.78);
      --card-border: 1px solid rgba(255, 255, 255, 0.7);
      --global-shadow: 0 20px 50px rgba(0, 0, 0, 0.04), 0 4px 12px rgba(0, 0, 0, 0.02);
    }

    body {
      font-family: 'Inter', sans-serif;
      background-image: linear-gradient(135deg, rgba(238, 241, 247, 0.75) 0%, rgba(243, 244, 248, 0.88) 100%),
        url('https://images.unsplash.com/photo-1587293852726-70cdb56c2866?auto=format&fit=crop&w=1600&q=80');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      margin: 0;
      min-height: 100vh;
      color: #1d1d1f;
      -webkit-font-smoothing: antialiased;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 6%;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-container img {
      height: 40px;
    }

    .btn-logout {
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      font-size: 13px;
      padding: 10px 24px;
      border-radius: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* CONTAINER LAYOUT */
    .dashboard-container {
      max-width: 1050px;
      margin: 50px auto;
      padding: 0 20px;
    }

    /* CARDS GLASSMORPHISM */
    .card,
    .hero-card {
      background: var(--card-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 30px;
      border: var(--card-border);
      box-shadow: var(--global-shadow);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .hero-card {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 35px;
      padding: 30px;
      margin-bottom: 28px;
    }

    .img-container {
      width: 100%;
      height: 210px;
      border-radius: 22px;
      overflow: hidden;
    }

    .local-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* CONTROLES DE ESTATUS (SWITCH STYLE iOS) */
    .status-controller-wrapper {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
    }

    .status-hub-tag {
      padding: 8px 18px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    /* Clases de estado dinámicas */
    .status-open {
      background: rgba(52, 199, 89, 0.1);
      color: #1e6b30;
    }

    .status-closed {
      background: rgba(255, 61, 48, 0.1);
      color: #8a1f1a;
    }

    .pulse-led {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      position: relative;
    }

    .status-open .pulse-led {
      background-color: var(--accent-green);
    }

    .status-closed .pulse-led {
      background-color: var(--accent-red);
    }

    .pulse-led::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      border-radius: 50%;
      animation: ledPing 2s infinite ease-in-out;
    }

    .status-open .pulse-led::after {
      background-color: var(--accent-green);
    }

    .status-closed .pulse-led::after {
      background-color: var(--accent-red);
    }

    @keyframes ledPing {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      100% {
        transform: scale(3);
        opacity: 0;
      }
    }

    /* TOGGLE SWITCH */
    .switch {
      position: relative;
      display: inline-block;
      width: 54px;
      height: 30px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #e9e9ea;
      transition: .3s ease;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 24px;
      width: 24px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s ease;
      border-radius: 50%;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
    }

    input:checked+.slider {
      background-color: var(--accent-green);
    }

    input:checked+.slider:before {
      transform: translateX(24px);
    }

    /* GRID REJILLA DE DATOS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .card {
      padding: 35px;
    }

    /* ALMACÉN INTERACTIVO */
    .capacity-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .capacity-title {
      font-size: 20px;
      font-weight: 700;
      margin: 0;
    }

    .inventory-controls {
      display: flex;
      gap: 8px;
    }

    .btn-counter {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .btn-counter:hover {
      background: #000;
      color: #fff;
    }

    .capacity-bar-bg {
      height: 14px;
      background: rgba(0, 0, 0, 0.04);
      border-radius: 50px;
      margin: 24px 0;
      overflow: hidden;
    }

    .capacity-bar-fill {
      height: 100%;
      width: 75%;
      /* Empieza en 75% directo */
      background: linear-gradient(90deg, #007AFF, #00c6ff);
      border-radius: 50px;
      transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .capacity-text {
      margin: 0;
      color: #6e6e73;
      font-weight: 600;
      font-size: 14px;
    }

    /* WALLET BOX */
    .wallet-box {
      background: linear-gradient(135deg, #0b0f19 0%, #000000 100%);
      color: #fff;
      padding: 35px;
      border-radius: 30px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .wallet-box h1 {
      font-size: 46px;
      font-weight: 800;
      margin: 8px 0 24px 0;
    }

    .wallet-box h1 span {
      font-size: 16px;
      font-weight: 500;
      opacity: 0.5;
      margin-left: 4px;
    }

    .btn-withdraw {
      padding: 12px 28px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      background: #ffffff;
      color: #000;
    }

    /* REVEAL ANIMATIONS */
    .reveal {
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .d1 {
      animation-delay: 0.05s;
    }

    .d2 {
      animation-delay: 0.1s;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 850px) {
      .hero-card {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="logo-container" style="cursor:pointer" onclick="location.href='index.html'">
      <img src="../Imagenes/enCaminoLogo.svg" alt="EnCamino">
    </div>
    <button class="btn-logout" onclick="location.href='index.html'">
      <i class="fa-solid fa-arrow-right-from-bracket"></i> Cerrar sesión
    </button>
  </nav>

  <main class="dashboard-container">

    <div class="hero-card reveal">
      <div class="img-container">
        <img src="https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=600&q=80"
          class="local-img" alt="Local">
      </div>
      <div style="display:flex; flex-direction:column; justify-content:center;">
        <h2 style="margin:0; font-size:32px; font-weight:800; letter-spacing: -0.8px;">Abarrotes "La Esquina"</h2>
        <p style="color:#6e6e73; font-size:16px; font-weight: 500; margin: 8px 0 15px 0;">
          <i class="fa-solid fa-location-dot" style="color: #ff3b30; margin-right: 4px;"></i> Av. México 123, Tepic,
          Nayarit
        </p>

        <div class="status-controller-wrapper">
          <span id="hub-status-badge" class="status-hub-tag status-open">
            <span class="pulse-led"></span>
            <span id="status-text">Estatus: Abierto / Activo</span>
          </span>

          <label class="switch">
            <input type="checkbox" id="status-toggle" checked onchange="toggleStoreStatus()">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>

    <div class="stats-grid">

      <div class="card reveal d1" style="display: flex; flex-direction: column; justify-content: center;">
        <div class="capacity-header">
          <h3 class="capacity-title">Capacidad de Almacén</h3>

          <div class="inventory-controls">
            <button class="btn-counter" onclick="updatePackages(-1)"><i class="fa-solid fa-minus"></i></button>
            <button class="btn-counter" onclick="updatePackages(1)"><i class="fa-solid fa-plus"></i></button>
          </div>
        </div>

        <div class="capacity-bar-bg">
          <div id="capacity-bar" class="capacity-bar-fill"></div>
        </div>
        <p class="capacity-text">
          <i class="fa-solid fa-box" style="margin-right: 4px; color: #444;"></i>
          <span id="percentage-text">75%</span> ocupado
          <span style="font-weight:700; color:#000;" id="count-text">(15/20 paquetes)</span>
        </p>
      </div>

      <div class="wallet-box reveal d2">
        <p
          style="margin:0; opacity:0.65; font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:1px;">
          Billetera Digital</p>
        <h1>$4,250.00 <span>MXN</span></h1>
        <button class="btn-withdraw">
          <i class="fa-solid fa-money-bill-transfer" style="margin-right: 6px;"></i> Retirar Fondos
        </button>
      </div>

    </div>

  </main>

  <script>
    // Variables globales (Inician directo con el valor por defecto: 15 de 20)
    let currentPackages = 15;
    const maxCapacity = 20;

    // Función directa para actualizar el inventario al tocar botones
    function updatePackages(amount) {
      let target = currentPackages + amount;

      // Validar límites entre 0 y el máximo
      if (target >= 0 && target <= maxCapacity) {
        currentPackages = target;

        // Calcular porcentaje matemático real
        let percentage = Math.round((currentPackages / maxCapacity) * 100);

        // Renderizar cambios visuales directos en el DOM
        const bar = document.getElementById('capacity-bar');
        document.getElementById('percentage-text').innerText = percentage + '%';
        document.getElementById('count-text').innerText = '(' + currentPackages + '/' + maxCapacity + ' paquetes)';
        bar.style.width = percentage + '%';

        // Alerta visual de color si se llena de más
        if (percentage >= 90) {
          bar.style.background = 'linear-gradient(90deg, #FF9500, #FF3B30)';
        } else {
          bar.style.background = 'linear-gradient(90deg, #007AFF, #00c6ff)';
        }
      }
    }

    // Función directa para alternar estatus del switch
    function toggleStoreStatus() {
      const toggle = document.getElementById('status-toggle');
      const badge = document.getElementById('hub-status-badge');
      const text = document.getElementById('status-text');

      if (toggle.checked) {
        badge.className = "status-hub-tag status-open";
        text.innerText = "Estatus: Abierto / Activo";
      } else {
        badge.className = "status-hub-tag status-closed";
        text.innerText = "Estatus: Cerrado / Inactivo";
      }
    }
  </script>
</body>

</html>
